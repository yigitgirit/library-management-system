services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    container_name: library-postgres
    # Variables are sourced from the .env file in the project root
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-143143}
      - POSTGRES_DB=${POSTGRES_DB:-library}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    ports:
      # Default to 5433 to avoid conflicts with local Postgres instances
      - "${DATABASE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-library}"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./apps/spring-boot-app
    container_name: library-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080" # Use BACKEND_PORT from .env, default to 8080 if not set
    environment:
      # Use the database service name for internal Docker networking
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/${POSTGRES_DB:-library}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-143143}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      # This command uses curl (installed in most base images) to check the actuator health endpoint.
      # It will only succeed when the Spring application is fully up and running.
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s # Give the app time to start before the first check

  frontend:
    build:
      context: ./apps/nextjs-app
    container_name: library-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Used by Browser (Browser-to-Host)
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8080}
      # Used by Next.js Server Components (Container-to-Container)
      - INTERNAL_API_URL=http://backend:8080
      # JWT secret for client-side operations
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      # Node environment
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
        backend:
          condition: service_healthy
    healthcheck:
      # This command checks if the Next.js server is responding to requests.
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
