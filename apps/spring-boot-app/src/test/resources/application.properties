# ===================================================================
# SPRING BOOT TEST PROFILE
# ===================================================================
spring.profiles.active=test

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
# Set a default log level for tests. Can be overridden with -DAPP_LOG_LEVEL=TRACE for debugging.
logging.level.root=INFO
logging.level.me.seyrek.library_management_system=${APP_LOG_LEVEL:INFO}
# Uncomment to see SQL parameter bindings in tests
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===================================================================
# DATABASE & JPA CONFIGURATION (H2 In-Memory)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Create and drop the schema for each test run
spring.jpa.hibernate.ddl-auto=create-drop

# Show and format SQL for easier debugging of test runs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Open Session In View pattern
spring.jpa.open-in-view=false

# Keep batch fetching consistent with main config
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# ===================================================================
# SECURITY & JWT CONFIGURATION
# ===================================================================
# Dummy Security Configuration (Required to start the context)
application.security.jwt.secret-key=this-is-a-dummy-secret-key-for-testing-purposes-only-make-it-long
application.security.jwt.access-token.expiration=3600000
application.security.jwt.refresh-token.expiration=86400000
application.security.jwt.refresh-token.cleanup-cron=0 0 0 * * *

# Dummy CORS Configuration (Required for SecurityConfig)
application.cors.allowed-origins=http://localhost:3000

# ===================================================================
# JSON SERIALIZATION
# ===================================================================
# Keep date serialization consistent with main config
spring.jackson.serialization.write-dates-as-timestamps=false

# ===================================================================
# BUSINESS LOGIC CONFIGURATION
# ===================================================================
# Dummy Business Logic Configuration
application.library.time-unit=DAYS
application.library.loan.max-active=5
application.library.loan.due-days=14
application.library.loan.due-soon-amount=3
application.library.loan.scheduler.cron=0 0 9 * * *
application.library.fine.max-unpaid-amount=50.0
application.library.fine.amount-per-time-unit=1.0
application.library.fine.progressive-multiplier=2.0
application.library.fine.progressive-time-threshold=2
application.library.fine.user-bad-history-threshold=5
application.library.fine.book-price-multiplier=3.0

# ===================================================================
# NOTIFICATION CONFIGURATION
# ===================================================================
app.notification.defaults.LOAN_OVERDUE=EMAIL
app.notification.defaults.LOAN_DUE_SOON=EMAIL
app.notification.defaults.FINE_ISSUED=EMAIL
app.notification.defaults.FINE_PAID=EMAIL
app.notification.defaults.GENERAL_ANNOUNCEMENT=EMAIL

# ===================================================================
# MAIL & ACTUATOR CONFIGURATION
# ===================================================================
# This triggers MailSenderAutoConfiguration to create a JavaMailSender bean
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Disable mail health indicator for tests
management.health.mail.enabled=false
