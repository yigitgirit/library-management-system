# ===================================================================
# DEVELOPMENT-SPECIFIC CONFIGURATION
# ===================================================================

# --- Database & JPA ---
# Show and format SQL queries for easy debugging during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- CORS ---
# Allow requests from the local Next.js development server.
# Can be overridden by setting the FRONTEND_URL environment variable.
application.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# --- Scheduler ---
# Run the loan scheduler every minute for easier testing in development
application.library.loan.scheduler.cron=0 * * * * *

# ===================================================================
# DEVELOPER TOOLS
# ===================================================================

# Enable LiveReload for automatic browser refresh during development
spring.devtools.livereload.enabled=true
# Poll interval for checking file changes to trigger restart
spring.devtools.restart.poll-interval=1s