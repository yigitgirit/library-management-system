# ===================================================================
# PRODUCTION-SPECIFIC CONFIGURATION
# ===================================================================

# --- Logging ---
# Reduce application-specific log noise in production by default.
# Can still be overridden by APP_LOG_LEVEL environment variable if debugging is needed.
logging.level.me.seyrek.library_management_system=${APP_LOG_LEVEL:WARN}

# --- Database & JPA ---
# Do not show or format SQL queries in production logs for performance and security
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- CORS ---
# This value MUST be provided by the 'FRONTEND_URL' environment variable in production.
# The application will fail to start if it's not set.
application.cors.allowed-origins=${FRONTEND_URL}

# --- Scheduler ---
# Run the loan scheduler once a day at 9 AM in production
application.library.loan.scheduler.cron=0 0 9 * * *