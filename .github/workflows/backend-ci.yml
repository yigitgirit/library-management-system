name: Spring Boot Backend CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'apps/spring-boot-app/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'apps/spring-boot-app/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/spring-boot-app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-reports
          path: apps/spring-boot-app/target/surefire-reports/
          retention-days: 7