services:
  database:
    image: postgres:17-alpine
    restart: always
    container_name: library-postgres
    # Variables are sourced from the .env file in the project root
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-143143}
      - POSTGRES_DB=${POSTGRES_DB:-library}
    volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./database/schema:/docker-entrypoint-initdb.d
    ports:
        # Uses DATABASE_PORT from .env, defaults to 5433 if not set
        - "${DATABASE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-library}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
